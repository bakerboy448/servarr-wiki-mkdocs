name: Content Request
description: Request new or expanded wiki content
labels: [enhancement]
body:
  - type: dropdown
    id: app
    attributes:
      label: Application
      options:
        - Lidarr
        - Prowlarr
        - Radarr
        - Readarr
        - Sonarr
        - Whisparr
        - General / Multiple
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New page
        - Expand existing page
        - Add examples / screenshots
        - FAQ entry
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What content would you like to see added or expanded?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context / use case
      description: Why is this content needed? What question does it answer?
