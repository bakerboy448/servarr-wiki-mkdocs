name: Feature / content request
description: Request new wiki content, MkDocs features, or tooling improvements
title: "[request] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Content additions that belong in the canonical wiki should usually be proposed in [Servarr/Wiki](https://github.com/Servarr/Wiki). Use this repo for MkDocs presentation, conversion, sync, and deploy improvements — or to track content that should be mirrored here after upstream lands.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Wiki content (page / section)
        - MkDocs site UX (nav, theme, search)
        - Conversion / sync tooling
        - CI / deployment (GitHub Pages, Cloudflare)
        - Contributor experience (templates, docs)
        - Other
    validations:
      required: true
  - type: dropdown
    id: app
    attributes:
      label: Application (if content-related)
      options:
        - Lidarr
        - Prowlarr
        - Radarr
        - Readarr
        - Sonarr
        - Whisparr
        - General / Multiple
        - Not applicable
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New page
        - Expand existing page
        - Examples / screenshots
        - FAQ entry
        - Site feature
        - Automation / CI
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Request
      description: What should be added or changed?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context / use case
      description: Who benefits, and what question or workflow does this unblock?
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach (optional)
      description: Sketch implementation, file paths, or links to upstream PRs.
      render: markdown
