name: Bug Report
description: Report incorrect or outdated wiki content
labels: [bug]
body:
  - type: dropdown
    id: app
    attributes:
      label: Application
      options:
        - Lidarr
        - Prowlarr
        - Radarr
        - Readarr
        - Sonarr
        - Whisparr
        - General / Multiple
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page URL or path
      description: Link to the affected wiki page or file path.
      placeholder: "e.g. https://wiki.servarr.com/radarr/settings or docs/radarr/settings.md"
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Issue type
      options:
        - Incorrect information
        - Outdated content
        - Broken link
        - Missing information
        - Formatting / rendering
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong with the current content?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should it say?
      description: Provide the correct information if known.
