name: Cloudflare Pages

# Skeleton deploy workflow. Disabled until secrets + project exist.
# See CONTRIBUTING.md → "Cloudflare Pages deployment".
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs site
        run: mkdocs build

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip automatically until secrets are configured. workflow_dispatch still
    # builds above; enable deploy by setting repository secrets and removing
    # this guard (or setting CF_PAGES_DEPLOY=true as a repo variable).
    if: ${{ vars.CF_PAGES_DEPLOY == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mkdocs-site
          path: site

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=servarr-wiki-mkdocs
          # Optional GitHub deployment status / PR comment wiring:
          # gitHubToken: ${{ secrets.GITHUB_TOKEN }}
