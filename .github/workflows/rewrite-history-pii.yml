name: Rewrite history (PII scrub)

# Force-rewrites commit author/committer emails + known email literals in blobs
# on GitHub-hosted runners, then force-pushes heads/tags and retargets releases.
#
# WARNING: This rewrites SHAs. Coordinate with all clone owners first.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type REWRITE to confirm a history rewrite + force-push"
        required: true
        type: string
      dry_run:
        description: "If true, rewrite locally in the runner but do not push"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: rewrite-history-pii
  cancel-in-progress: false

jobs:
  rewrite:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ inputs.confirm == 'REWRITE' }}
    steps:
      - name: Checkout full history and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all remote heads
        run: |
          git fetch origin --prune --force '+refs/heads/*:refs/remotes/origin/*'
          git fetch origin --tags --force

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Create local branches for every remote head
        run: |
          for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin | grep -v 'origin/HEAD'); do
            branch="${ref#origin/}"
            git branch -f "$branch" "$ref" 2>/dev/null || git branch "$branch" "$ref"
          done

      - name: Build rewrite maps (no personal addresses hardcoded)
        run: |
          python3 <<'PY'
          import hashlib, re, subprocess
          from pathlib import Path

          SAFE = re.compile(
              r"(@users\.noreply\.github\.com$|^noreply@github\.com$|"
              r"^noreply@anthropic\.com$|^support@github\.com$|"
              r"^development@lidarr\.audio$|^wiki@lidarr\.audio$|"
              r"^cursoragent@cursor\.com$|"
              r"^email@example\.(com|org)$|^info@nzbgeek\.info$|"
              r"\[bot\]@)",
              re.I,
          )

          def redact(email: str) -> str:
              e = email.strip().lower()
              if not e or e == "redacted@users.noreply.github.com":
                  return "redacted@users.noreply.github.com"
              if SAFE.search(e):
                  return email.strip()
              digest = hashlib.sha256(e.encode()).hexdigest()[:10]
              return f"redacted-{digest}@users.noreply.github.com"

          meta = subprocess.check_output(
              ["git", "log", "--all", "--format=%ae%n%ce"], text=True
          )
          emails = sorted({e.strip() for e in meta.splitlines() if e.strip()})

          mailmap_lines = []
          replace_lines = []
          for old in emails:
              new = redact(old)
              if new.lower() == old.lower():
                  continue
              # Keep display name mapping-less; email-only mailmap entries
              mailmap_lines.append(f"<{new}> <{old}>")
              # Never substring-replace bare tokens like "undefined"
              if "@" in old:
                  replace_lines.append(f"{old}==>{new}")
                  if old != old.lower():
                      replace_lines.append(f"{old.lower()}==>{new}")

          # Discover emails in blob contents across history (text files)
          blob = subprocess.check_output(
              ["bash", "-lc", r"""
              git rev-list --all | while read -r c; do
                git grep -I -ohE '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}' "$c" 2>/dev/null || true
              done | sed 's/^[^:]*://' | sort -u
              """],
              text=True,
          )
          for old in {e.strip() for e in blob.splitlines() if e.strip()}:
              new = redact(old)
              if new.lower() == old.lower():
                  continue
              replace_lines.append(f"{old}==>{new}")

          Path("/tmp/pii-mailmap").write_text("\n".join(mailmap_lines) + "\n")
          Path("/tmp/replace-text.txt").write_text("\n".join(sorted(set(replace_lines))) + "\n")
          print(f"mailmap entries: {len(mailmap_lines)}")
          print(f"replace-text entries: {len(set(replace_lines))}")
          PY

      - name: Rewrite history with filter-repo
        run: |
          git filter-repo --force \
            --mailmap /tmp/pii-mailmap \
            --replace-text /tmp/replace-text.txt \
            --replace-message /tmp/replace-text.txt

      - name: Ensure sanitized .mailmap on default branch
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git checkout "$DEFAULT_BRANCH"
          cat > .mailmap <<'EOF'
          # Prefer GitHub noreply. Do not store personal addresses here.
          bakerboy448 <55419169+bakerboy448@users.noreply.github.com>
          EOF
          sed -i 's/^[[:space:]]*//' .mailmap
          git add .mailmap
          git -c user.name='bakerboy448' \
              -c user.email='55419169+bakerboy448@users.noreply.github.com' \
              commit -m 'chore: keep mailmap free of personal email addresses' || true

      - name: Verify non-safe emails removed from metadata
        run: |
          python3 <<'PY'
          import re, subprocess, sys
          SAFE = re.compile(
              r"(@users\.noreply\.github\.com$|^noreply@github\.com$|"
              r"^noreply@anthropic\.com$|^support@github\.com$|"
              r"^development@lidarr\.audio$|^wiki@lidarr\.audio$|"
              r"^cursoragent@cursor\.com$|"
              r"^redacted(-[0-9a-f]+)?@users\.noreply\.github\.com$|"
              r"\[bot\]@)",
              re.I,
          )
          meta = subprocess.check_output(["git", "log", "--all", "--format=%ae%n%ce"], text=True)
          bad = sorted({e for e in meta.splitlines() if e and not SAFE.search(e)})
          if bad:
              print("ERROR: non-safe emails remain:", *bad, sep="\n", file=sys.stderr)
              sys.exit(1)
          print("OK: commit metadata emails are sanitized")
          PY

      - name: Re-add origin remote
        run: |
          git remote remove origin 2>/dev/null || true
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Force-push all heads and tags
        if: ${{ inputs.dry_run == false }}
        run: |
          git push --force origin --all
          git push --force origin --tags

      - name: Retarget GitHub Releases to rewritten tags
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t releases < <(gh release list --limit 100 --json tagName,name,isLatest,isPrerelease,isDraft -q '.[] | @base64')
          for row in "${releases[@]:-}"; do
            [[ -z "$row" ]] && continue
            _jq() { echo "$row" | base64 -d | jq -r "$1"; }
            tag="$(_jq .tagName)"
            name="$(_jq .name)"
            latest="$(_jq .isLatest)"
            pre="$(_jq .isPrerelease)"
            draft="$(_jq .isDraft)"
            body="$(gh release view "$tag" --json body -q .body)"
            echo "Retargeting release tag=$tag"
            gh release delete "$tag" --yes --cleanup-tag=false || true
            args=(create "$tag" --title "${name:-$tag}" --notes "$body")
            [[ "$latest" == "true" ]] && args+=(--latest)
            [[ "$pre" == "true" ]] && args+=(--prerelease)
            [[ "$draft" == "true" ]] && args+=(--draft)
            gh release "${args[@]}"
          done

      - name: Dry-run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "Dry run complete — no refs were pushed."
          git log --all --format='%ae' | sort | uniq -c | sort -rn | head -40
