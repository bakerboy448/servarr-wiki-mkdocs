name: Rewrite history (PII scrub)

# Force-rewrites commit author/committer identities on GitHub-hosted runners,
# then force-pushes all heads + tags and retargets releases.
#
# WARNING: This rewrites SHAs. Coordinate with all fork/clone owners first.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type REWRITE to confirm a history rewrite + force-push'
        required: true
        type: string
      dry_run:
        description: 'If true, rewrite locally in the runner but do not push'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: rewrite-history-pii
  cancel-in-progress: false

jobs:
  rewrite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ inputs.confirm == 'REWRITE' }}
    steps:
      - name: Checkout full history and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all remotes refs
        run: |
          git fetch origin --prune --prune-tags --force '+refs/heads/*:refs/remotes/origin/*'
          git fetch origin --tags --force

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Build mailmap
        run: |
          cat > /tmp/pii-mailmap <<'EOF'
          bakerboy448 <55419169+bakerboy448@users.noreply.github.com> bakerboy44801 <redacted-94464fe7d5@users.noreply.github.com>
          bakerboy448 <55419169+bakerboy448@users.noreply.github.com> bakerboy448 <redacted-94464fe7d5@users.noreply.github.com>
          bakerboy448 <55419169+bakerboy448@users.noreply.github.com> Bakerboy448 <55419169+bakerboy448@users.noreply.github.com>
          bakerboy448 <55419169+bakerboy448@users.noreply.github.com> bakerboy448 <mailto:55419169+bakerboy448@users.noreply.github.com>
          bakerboy448 <55419169+bakerboy448@users.noreply.github.com> bakerboy44801 <55419169+bakerboy448@users.noreply.github.com>
          EOF
          # Strip leading indentation from heredoc lines
          sed -i 's/^[[:space:]]*//' /tmp/pii-mailmap
          cp /tmp/pii-mailmap .mailmap
          cat /tmp/pii-mailmap

      - name: Snapshot refs before rewrite
        id: before
        run: |
          git for-each-ref --format='%(refname) %(objectname)' refs/heads refs/tags > /tmp/refs-before.txt
          git for-each-ref --format='%(refname) %(objectname)' refs/remotes/origin | sed 's#refs/remotes/origin/#refs/heads/#' >> /tmp/refs-before.txt || true
          sort -u /tmp/refs-before.txt -o /tmp/refs-before.txt
          wc -l /tmp/refs-before.txt

      - name: Create local branches for every remote head
        run: |
          for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin | grep -v 'origin/HEAD'); do
            branch="${ref#origin/}"
            git branch -f "$branch" "$ref" 2>/dev/null || git branch "$branch" "$ref"
          done
          git branch -a

      - name: Rewrite history with filter-repo
        run: |
          git filter-repo --force \
            --mailmap /tmp/pii-mailmap \
            --replace-message <(printf 'redacted-94464fe7d5@users.noreply.github.com==>REDACTED\n')

      - name: Ensure .mailmap present on default branch tip
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git checkout "$DEFAULT_BRANCH"
          if [[ ! -f .mailmap ]]; then
            cp /tmp/pii-mailmap .mailmap
            git add .mailmap
            git -c user.name='bakerboy448' \
                -c user.email='55419169+bakerboy448@users.noreply.github.com' \
                commit -m 'chore: add mailmap to keep author identity on GitHub noreply' || true
          fi

      - name: Verify personal email removed
        run: |
          if git log --all --format='%ae%n%ce' | grep -F 'redacted-94464fe7d5@users.noreply.github.com'; then
            echo 'ERROR: personal email still present after rewrite' >&2
            exit 1
          fi
          echo 'OK: no redacted-94464fe7d5@users.noreply.github.com in author/committer metadata'

      - name: Re-add origin remote
        run: |
          git remote remove origin 2>/dev/null || true
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Force-push all heads and tags
        if: ${{ inputs.dry_run == false }}
        run: |
          # Push every local branch
          git push --force origin --all
          # Push every tag (annotated + lightweight)
          git push --force origin --tags

      - name: Retarget GitHub Releases to rewritten tags
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # For each release, delete + recreate against the (rewritten) tag tip
          mapfile -t releases < <(gh release list --limit 100 --json tagName,name,isLatest,isPrerelease,isDraft -q '.[] | @base64')
          for row in "${releases[@]:-}"; do
            [[ -z "$row" ]] && continue
            _jq() { echo "$row" | base64 -d | jq -r "$1"; }
            tag="$(_jq .tagName)"
            name="$(_jq .name)"
            latest="$(_jq .isLatest)"
            pre="$(_jq .isPrerelease)"
            draft="$(_jq .isDraft)"
            body="$(gh release view "$tag" --json body -q .body)"
            echo "Retargeting release tag=$tag"
            gh release delete "$tag" --yes --cleanup-tag=false || true
            args=(create "$tag" --title "${name:-$tag}" --notes "$body")
            [[ "$latest" == "true" ]] && args+=(--latest)
            [[ "$pre" == "true" ]] && args+=(--prerelease)
            [[ "$draft" == "true" ]] && args+=(--draft)
            gh release "${args[@]}"
          done

      - name: Dry-run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "Dry run complete — no refs were pushed."
          echo "Re-run with dry_run=false to force-push heads/tags and retarget releases."
          git for-each-ref --format='%(refname) %(objectname)' refs/heads refs/tags | head -50
