name: Pre-commit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run pre-commit
        id: pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files
        continue-on-error: true

      - name: Push auto-fixes
        if: steps.pre-commit.outcome == 'failure' && github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No auto-fixable changes — pre-commit failed on unfixable issues"
            exit 1
          fi
          git add -A
          git commit -m "style: auto-fix pre-commit issues"
          git push

      - name: Fail if pre-commit failed on push to main
        if: steps.pre-commit.outcome == 'failure' && github.event_name == 'push'
        run: exit 1
