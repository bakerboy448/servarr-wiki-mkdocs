site_name: Servarr Wiki
site_description: Official wiki for Lidarr, Radarr, Readarr, Sonarr, Whisparr, and Prowlarr
site_author: Servarr
site_url: https://wiki.servarr.com/
repo_url: https://github.com/Servarr/Wiki
repo_name: Servarr/Wiki
edit_uri: edit/main/docs/

# TODO: Re-enable strict mode after fixing broken anchors in these high-priority files:
#   - whisparr/troubleshooting.md (#problem-not-listed-1, #problem-not-listed-2, etc.)
#   - whisparr/installation/multiple-instances.md (#windows-multi, #linux-multi, etc.)
#   - readarr/troubleshooting.md (#common-problems-1, #query-successful---, etc.)
#   - sonarr/settings.md (#series-naming-1, #download-clients-1, etc.)
#   - sonarr/faq.md (#whats-the-different-series-types, etc.)
#   - sonarr/xem-guide.md (#-sxxexx-mapping, #-absolute-mapping, etc.)
#   - useful-tools.md (missing #twitter anchor linked from supported.md in multiple arr)
#   - readarr/installation/multiple-instances.md (#windows-multi, etc.)
# Tracking issue: 384 anchor warnings abort --strict CI build; disable temporarily.
strict: false

validation:
  nav:
    omitted_files: info
  links:
    not_found: warn
    anchors: warn
    absolute_links: ignore
    unrecognized_links: warn

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.tooltips
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - glightbox:
      touchNavigation: true
      effect: zoom
      zoomable: true
      draggable: true
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - social

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Servarr
    - icon: fontawesome/brands/discord
      link: https://wiki.servarr.com/discord
